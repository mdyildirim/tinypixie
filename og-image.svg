<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <radialGradient id="bg" cx="34%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#241640"/>
      <stop offset="60%" stop-color="#120e2c"/>
      <stop offset="100%" stop-color="#0a0a1f"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cdb6ff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#8a7bff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#8a7bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body" cx="42%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#ffd9f4"/>
      <stop offset="100%" stop-color="#c77bff"/>
    </radialGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bdf0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#bda7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcd0ff"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background so the cropped 1200x630 band is solid -->
  <rect width="1200" height="1200" fill="url(#bg)"/>

  <!-- everything below is authored inside the centred y:285..915 band -->
  <!-- a scatter of stars -->
  <g fill="#ffffff">
    <circle cx="90"  cy="360" r="2.6" opacity="0.8"/>
    <circle cx="200" cy="450" r="1.8" opacity="0.6"/>
    <circle cx="150" cy="760" r="2.2" opacity="0.7"/>
    <circle cx="60"  cy="600" r="1.6" opacity="0.5"/>
    <circle cx="300" cy="345" r="2.0" opacity="0.7"/>
    <circle cx="520" cy="400" r="1.8" opacity="0.6"/>
    <circle cx="470" cy="800" r="2.4" opacity="0.7"/>
    <circle cx="760" cy="360" r="2.0" opacity="0.65"/>
    <circle cx="980" cy="420" r="2.6" opacity="0.8"/>
    <circle cx="1120" cy="365" r="1.8" opacity="0.6"/>
    <circle cx="1080" cy="585" r="2.2" opacity="0.7"/>
    <circle cx="1140" cy="755" r="2.0" opacity="0.65"/>
    <circle cx="900" cy="820" r="2.4" opacity="0.7"/>
    <circle cx="680" cy="845" r="1.6" opacity="0.5"/>
    <circle cx="1020" cy="840" r="1.8" opacity="0.6"/>
  </g>

  <!-- Pixie, drifting on the left (band centre y = 600) -->
  <g transform="translate(345 600) scale(1.7)">
    <circle r="180" fill="url(#halo)"/>
    <ellipse cx="-78" cy="-18" rx="84" ry="56" fill="url(#wing)" transform="rotate(-28 -78 -18)"/>
    <ellipse cx="78" cy="-18" rx="84" ry="56" fill="url(#wing)" transform="rotate(28 78 -18) scale(-1 1)"/>
    <circle r="68" fill="url(#body)"/>
    <circle cx="-22" cy="-6" r="9" fill="#241433"/>
    <circle cx="22" cy="-6" r="9" fill="#241433"/>
    <circle cx="-25" cy="-9" r="3" fill="#fff"/>
    <circle cx="19" cy="-9" r="3" fill="#fff"/>
    <path d="M-16 18 Q0 34 16 18" stroke="#3a1f4d" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="-34" cy="14" r="9" fill="#ff7fb0" opacity="0.7"/>
    <circle cx="34" cy="14" r="9" fill="#ff7fb0" opacity="0.7"/>
  </g>

  <!-- wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif">
    <text x="660" y="585" fill="url(#word)" font-size="132" font-weight="700" letter-spacing="2">Pixie</text>
    <text x="663" y="647" fill="#b9b0e8" font-size="40" font-weight="400">a little toy of light &amp; sound</text>
    <text x="664" y="705" fill="#7d77ad" font-size="27" font-weight="500" letter-spacing="3">TINYPIXIE.COM</text>
  </g>
</svg>
